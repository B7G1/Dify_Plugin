name: Bug report
description: Report a reproducible defect without secrets
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Never include API keys, passwords, tokens, internal hosts, or database dumps."
  - type: input
    id: version
    attributes: {label: Plugin and Dify versions}
    validations: {required: true}
  - type: dropdown
    id: database
    attributes:
      label: Database
      options: [MySQL, PostgreSQL, DM8, Not database-specific]
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Reproduction steps, description: Use sanitized values only.}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: actual
    attributes: {label: Actual behavior and sanitized evidence}
    validations: {required: true}
  - type: checkboxes
    id: hygiene
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, private hosts, tokens, and personal data.
          required: true
