services:
  db_postgres:
    volumes:
      - dify_postgres_data_v1:/var/lib/postgresql/data

  init_plugin_database:
    image: postgres:15-alpine
    restart: "no"
    environment:
      PGPASSWORD: ${DB_PASSWORD:-difyai123456}
    command:
      - sh
      - -ec
      - |
        until pg_isready -h db_postgres -U postgres -d dify; do sleep 1; done
        exists="$$(psql -h db_postgres -U postgres -d postgres -Atc "SELECT 1 FROM pg_database WHERE datname='dify_plugin'")"
        if [ "$$exists" != "1" ]; then
          createdb -h db_postgres -U postgres dify_plugin
        fi
    depends_on:
      db_postgres:
        condition: service_healthy

  plugin_daemon:
    depends_on:
      init_plugin_database:
        condition: service_completed_successfully

  weaviate:
    volumes:
      - dify_weaviate_data_v1:/var/lib/weaviate

volumes:
  dify_postgres_data_v1:
    name: dify_postgres_data_v1
  dify_weaviate_data_v1:
    name: dify_weaviate_data_v1
