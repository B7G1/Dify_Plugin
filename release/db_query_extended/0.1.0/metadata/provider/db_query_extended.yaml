identity:
  author: li_zijun
  name: db_query_extended
  label:
    en_US: Extended Database Query
    zh_Hans: 扩展数据库查询
  description:
    en_US: Configure a MySQL or PostgreSQL connection for the read-only SQL query tool.
    zh_Hans: 为只读 SQL 查询工具配置 MySQL 或 PostgreSQL 连接。
  icon: icon.svg

credentials_for_provider:
  database_type:
    type: select
    required: true
    default: mysql
    options:
      - value: mysql
        label:
          en_US: MySQL
          zh_Hans: MySQL
      - value: postgresql
        label:
          en_US: PostgreSQL
          zh_Hans: PostgreSQL
    label:
      en_US: Database type
      zh_Hans: 数据库类型
  host:
    type: text-input
    required: true
    default: localhost
    label:
      en_US: Host
      zh_Hans: 主机地址
    help:
      en_US: Database hostname. Use localhost for the standard local test environment.
      zh_Hans: 数据库主机地址。标准本地测试环境使用 localhost。
  port:
    type: text-input
    required: true
    label:
      en_US: Port
      zh_Hans: 端口
    help:
      en_US: MySQL normally uses 3306; PostgreSQL normally uses 5432.
      zh_Hans: MySQL 通常使用 3306；PostgreSQL 通常使用 5432。
  username:
    type: text-input
    required: true
    label:
      en_US: Username
      zh_Hans: 用户名
  password:
    type: secret-input
    required: true
    label:
      en_US: Password
      zh_Hans: 密码
  database:
    type: text-input
    required: true
    default: plugin_test
    label:
      en_US: Database
      zh_Hans: 数据库名
  connection_timeout:
    type: text-input
    required: false
    default: "10"
    label:
      en_US: Connection timeout in seconds
      zh_Hans: 连接超时（秒）
    help:
      en_US: Maximum time to establish a database connection, in seconds.
      zh_Hans: 建立数据库连接的最长等待时间，单位为秒。
  ssl_mode:
    type: select
    required: false
    default: disable
    options:
      - value: disable
        label:
          en_US: Disable
          zh_Hans: 禁用
      - value: prefer
        label:
          en_US: Prefer
          zh_Hans: 优先使用
      - value: require
        label:
          en_US: Require
          zh_Hans: 强制使用
    label:
      en_US: SSL mode
      zh_Hans: SSL 模式
    help:
      en_US: Disable is intended for local testing; prefer and require are for future secure deployment scenarios.
      zh_Hans: 本地测试使用禁用；优先使用和强制使用为后续安全部署场景预留。

tools:
  - tools/db_query_extended.yaml

extra:
  python:
    source: provider/db_query_extended.py
