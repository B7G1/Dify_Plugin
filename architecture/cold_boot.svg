<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
<defs><style>.bg{fill:#f5f7fb}.box{fill:#fff;stroke:#2463eb;stroke-width:4}.pass{fill:#e9f8ef;stroke:#0a8a4b;stroke-width:4}.title{font:700 52px 'Segoe UI','Microsoft YaHei';fill:#14213d}.head{font:700 28px 'Segoe UI','Microsoft YaHei';fill:#14213d}.text{font:21px 'Segoe UI','Microsoft YaHei';fill:#516078}.edge{stroke:#2463eb;stroke-width:5;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2463eb"/></marker></defs>
<rect class="bg" width="1920" height="1080"/><text class="title" x="110" y="105">Cold Boot Verification</text><text class="text" x="110" y="150">A full stop, identity check and business regression prove the same environment returned.</text>
